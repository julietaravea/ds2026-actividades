<!DOCTYPE html>
<html lang="es">
<head>

    <title>Contacto</title>

<body>
    <nav>
        <a href="index.html">inicio</a>
        <a href="contacto.html">contacto</a>

    <h1>CONTACTO</h1>

    <form>
        <input type="text" placeholder ="Ingrese su nombre" required>
        <input type="email" placeholder ="usuario@ejemplo.com" required>
        <input type="password" placeholder ="Mínimo 6 caracteres" minlength="6" required>
        <input type="number" placeholder ="Edad (18-99)" min="18" max="99" required>
        <input type="date" min="2000-01-01" max="2025-12-31" required>
        <input type="file" accept="image/*" required>
        <button type="submit">Enviar</button>
    </form>
</body>
